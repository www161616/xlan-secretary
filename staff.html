<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>員工回報</title>
<script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<style>
  :root{
    --page:#FFFBEB; --soft:#FEF3C7; --line:#FCD34D; --primary:#F59E0B;
    --primary-dark:#92400E; --text:#1F2937; --muted:#6B7280; --danger:#DC2626;
    --ok:#16A34A; --white:#fff;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang TC","Microsoft JhengHei",sans-serif;
    background:var(--page); color:var(--text); font-size:17px; line-height:1.5;
    padding:16px 16px 120px; max-width:520px; margin:0 auto;
  }
  h1{font-size:22px; color:var(--primary-dark); margin:4px 0 2px; display:flex; align-items:center; gap:8px;}
  .sub{color:var(--muted); font-size:14px; margin:0 0 18px;}
  .who{font-size:13px; color:var(--muted); margin-bottom:14px;}
  .card{background:var(--white); border:1px solid var(--line); border-radius:16px; padding:16px; margin-bottom:16px; box-shadow:0 1px 0 rgba(146,64,14,.04);}
  .label{font-weight:700; color:var(--primary-dark); margin:0 0 10px; font-size:15px;}
  .req::after{content:" *"; color:var(--danger);}
  .type-grid{display:grid; grid-template-columns:1fr 1fr; gap:10px;}
  .type-btn{
    border:2px solid var(--line); background:var(--page); color:var(--text);
    border-radius:14px; padding:14px 8px; font-size:18px; font-weight:700; cursor:pointer;
    transition:all .12s; display:flex; flex-direction:column; align-items:center; gap:4px;
  }
  .type-btn .emoji{font-size:24px;}
  .type-btn.on{background:var(--primary); border-color:var(--primary); color:var(--white); box-shadow:0 4px 12px rgba(245,158,11,.35);}
  .qty-row{display:flex; align-items:center; justify-content:center; gap:18px; margin-top:4px;}
  .qty-btn{width:56px; height:56px; border-radius:50%; border:2px solid var(--primary); background:var(--white); color:var(--primary-dark); font-size:30px; font-weight:700; cursor:pointer; line-height:1;}
  .qty-btn:active{background:var(--soft);}
  .qty-val{font-size:40px; font-weight:800; color:var(--primary-dark); min-width:64px; text-align:center;}
  .qty-hint{text-align:center; color:var(--muted); font-size:13px; margin-top:8px;}
  .scan-btn{width:100%; border:none; background:var(--primary); color:var(--white); border-radius:14px; padding:15px; font-size:18px; font-weight:800; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:8px;}
  .scan-btn:active{filter:brightness(.95);}
  .or{text-align:center; color:var(--muted); font-size:13px; margin:12px 0 10px;}
  .manual-row{display:flex; gap:8px;}
  input[type=text], textarea{
    width:100%; border:2px solid var(--line); border-radius:12px; padding:12px; font-size:16px;
    font-family:inherit; background:var(--white); color:var(--text);
  }
  input:focus, textarea:focus{outline:none; border-color:var(--primary);}
  .add-btn{flex:0 0 auto; border:none; background:var(--primary-dark); color:#fff; border-radius:12px; padding:0 18px; font-size:16px; font-weight:700; cursor:pointer;}
  .tn-list{margin-top:12px; display:flex; flex-direction:column; gap:8px;}
  .tn-item{display:flex; align-items:center; justify-content:space-between; background:var(--soft); border-radius:12px; padding:11px 14px; font-size:16px; font-weight:600; letter-spacing:.3px; word-break:break-all;}
  .tn-item .del{flex:0 0 auto; margin-left:10px; border:none; background:transparent; color:var(--danger); font-size:20px; cursor:pointer; font-weight:700;}
  .photo-area{display:flex; flex-wrap:wrap; gap:10px; margin-top:4px;}
  .photo-thumb{position:relative; width:84px; height:84px; border-radius:12px; overflow:hidden; border:1px solid var(--line);}
  .photo-thumb img{width:100%; height:100%; object-fit:cover; display:block;}
  .photo-thumb .del{position:absolute; top:2px; right:2px; width:24px; height:24px; border-radius:50%; border:none; background:rgba(0,0,0,.55); color:#fff; font-size:15px; cursor:pointer; line-height:24px; text-align:center; padding:0;}
  .add-photo{width:84px; height:84px; border-radius:12px; border:2px dashed var(--line); background:var(--page); color:var(--muted); font-size:30px; cursor:pointer; display:flex; align-items:center; justify-content:center;}
  textarea{min-height:64px; resize:vertical;}
  .submit-bar{position:fixed; left:0; right:0; bottom:0; padding:12px 16px calc(12px + env(safe-area-inset-bottom)); background:linear-gradient(to top,var(--page) 70%,transparent); }
  .submit-bar .inner{max-width:520px; margin:0 auto;}
  .submit-btn{width:100%; border:none; background:var(--primary); color:#fff; border-radius:16px; padding:17px; font-size:20px; font-weight:800; cursor:pointer; box-shadow:0 6px 16px rgba(245,158,11,.4);}
  .submit-btn:disabled{opacity:.55; box-shadow:none;}
  .toast{position:fixed; left:50%; bottom:96px; transform:translateX(-50%); background:#111827; color:#fff; padding:11px 18px; border-radius:999px; font-size:14px; opacity:0; transition:opacity .2s; pointer-events:none; z-index:50; max-width:90%; text-align:center;}
  .toast.show{opacity:.95;}
  .hidden{display:none !important;}
  /* 結果頁 */
  #done{text-align:center; padding-top:40px;}
  #done .big{font-size:64px;}
  #done h2{color:var(--ok); font-size:24px; margin:12px 0 6px;}
  #done .detail{background:var(--white); border:1px solid var(--line); border-radius:14px; padding:14px; text-align:left; margin:16px 0; font-size:15px;}
  #done .detail .li{padding:6px 0; border-bottom:1px dashed var(--line);}
  #done .detail .li:last-child{border-bottom:none;}
  .ghost-btn{width:100%; border:2px solid var(--primary); background:var(--white); color:var(--primary-dark); border-radius:14px; padding:14px; font-size:17px; font-weight:700; cursor:pointer; margin-top:10px;}
  .loading{text-align:center; color:var(--muted); padding:60px 0;}
  .spinner{width:40px;height:40px;border:4px solid var(--soft);border-top-color:var(--primary);border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 14px;}
  @keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>
<body>

<div id="boot" class="loading">
  <div class="spinner"></div>
  載入中…
</div>

<!-- 表單 -->
<div id="form" class="hidden">
  <h1>📦 員工回報</h1>
  <p class="sub">選一下、掃一下就好，小瀾會自動寫進表單。</p>
  <p class="who" id="who"></p>

  <div class="card">
    <p class="label req">問題類型</p>
    <div class="type-grid" id="typeGrid">
      <button class="type-btn" data-type="少貨"><span class="emoji">📉</span>少貨</button>
      <button class="type-btn" data-type="破損"><span class="emoji">💥</span>破損</button>
      <button class="type-btn" data-type="錯貨"><span class="emoji">🔀</span>錯貨</button>
      <button class="type-btn" data-type="多貨"><span class="emoji">📈</span>多貨</button>
      <button class="type-btn" data-type="未到貨"><span class="emoji">🚫</span>未到貨</button>
      <button class="type-btn" data-type="其他"><span class="emoji">❓</span>其他</button>
    </div>
  </div>

  <div class="card" id="qtyCard">
    <p class="label">數量（有幾件有問題）</p>
    <div class="qty-row">
      <button class="qty-btn" id="qtyMinus">−</button>
      <div class="qty-val" id="qtyVal">1</div>
      <button class="qty-btn" id="qtyPlus">＋</button>
    </div>
    <p class="qty-hint">不確定就抓大概，主管會再核對</p>
  </div>

  <div class="card">
    <p class="label">運單號</p>
    <button class="scan-btn" id="scanBtn">📷 掃運單條碼</button>
    <p class="or">掃不到？直接打也行（可多筆）</p>
    <div class="manual-row">
      <input type="text" id="tnInput" inputmode="text" placeholder="輸入運單號" />
      <button class="add-btn" id="tnAdd">加入</button>
    </div>
    <div class="tn-list" id="tnList"></div>
  </div>

  <div class="card">
    <p class="label">問題照片（破損／少貨拍清楚）</p>
    <div class="photo-area" id="photoArea">
      <label class="add-photo">＋
        <input type="file" id="photoInput" accept="image/*" multiple class="hidden" />
      </label>
    </div>
  </div>

  <div class="card">
    <p class="label">備註（選填）</p>
    <textarea id="noteInput" placeholder="想補充的就打這（例：外箱破一個角）"></textarea>
  </div>
</div>

<!-- 完成頁 -->
<div id="done" class="hidden">
  <div class="big">✅</div>
  <h2 id="doneTitle">回報完成！</h2>
  <p class="sub" id="doneSub"></p>
  <div class="detail" id="doneDetail"></div>
  <button class="submit-btn" id="closeBtn">關閉</button>
  <button class="ghost-btn" id="againBtn">再回報一筆</button>
</div>

<div class="submit-bar hidden" id="submitBar">
  <div class="inner">
    <button class="submit-btn" id="submitBtn">送出回報</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
(function(){
  var qs = new URLSearchParams(location.search);
  var GROUP_ID = qs.get('g') || '';
  var API_URL = '/api/staff-report';
  // 後備 LIFF ID（LIFF ID 非機密、本來就會出現在網址）。
  // 後端 STAFF_LIFF_ID 有設就以後端為準；沒設也能靠這個開起來。
  var FALLBACK_LIFF_ID = '2009806013-E5IVkIFT';

  var state = { type:'', qty:1, trackingNos:[], photos:[], profile:null, idToken:'' };

  var el = function(id){ return document.getElementById(id); };
  function toast(msg){
    var t = el('toast'); t.textContent = msg; t.classList.add('show');
    clearTimeout(toast._t); toast._t = setTimeout(function(){ t.classList.remove('show'); }, 2200);
  }
  function show(id){ el(id).classList.remove('hidden'); }
  function hide(id){ el(id).classList.add('hidden'); }

  // ---- 啟動 ----
  // 先跟後端拿 LIFF ID（單一來源＝STAFF_LIFF_ID）再 init。
  // 不能直接讀網址 ?liff=，因為 LIFF 開啟時參數會被包進 liff.state，init 前讀不到。
  fetch(API_URL, { method:'GET' })
    .then(function(r){ return r.json(); })
    .then(function(cfg){
      var liffId = String((cfg && cfg.liffId) || qs.get('liff') || FALLBACK_LIFF_ID || '').trim();
      if (!liffId) throw new Error('沒有 LIFF ID');
      return liff.init({ liffId: liffId });
    })
    .then(function(){
      if (!liff.isLoggedIn()) { liff.login(); return; }
      // 群組 ID 用 LIFF context 取，比網址參數可靠
      try {
        var ctx = liff.getContext();
        if (ctx && (ctx.groupId || ctx.roomId)) GROUP_ID = ctx.groupId || ctx.roomId;
      } catch (e) {}
      var p = liff.getProfile().catch(function(){ return null; });
      var idt = Promise.resolve(liff.getIDToken && liff.getIDToken());
      return Promise.all([p, idt]).then(function(arr){
        state.profile = arr[0];
        state.idToken = arr[1] || '';
        el('who').textContent = state.profile ? ('回報人：' + state.profile.displayName) : '';
        hide('boot'); show('form'); show('submitBar');
      });
    })
    .catch(function(e){
      el('boot').innerHTML = '⚠️ 載入失敗：' + (e && e.message ? e.message : e) +
        '<br><br>請確認這是從 LINE 開啟，或 LIFF 設定正確。';
    });

  // ---- 問題類型 ----
  el('typeGrid').addEventListener('click', function(e){
    var btn = e.target.closest('.type-btn'); if (!btn) return;
    state.type = btn.dataset.type;
    Array.prototype.forEach.call(document.querySelectorAll('.type-btn'), function(b){ b.classList.remove('on'); });
    btn.classList.add('on');
    // 未到貨：整筆沒到，不用數數量
    if (state.type === '未到貨') { hide('qtyCard'); state.qty = 1; }
    else { show('qtyCard'); }
  });

  // ---- 數量 ----
  function renderQty(){ el('qtyVal').textContent = state.qty; }
  el('qtyMinus').addEventListener('click', function(){ if (state.qty > 1) { state.qty--; renderQty(); } });
  el('qtyPlus').addEventListener('click', function(){ if (state.qty < 999) { state.qty++; renderQty(); } });

  // ---- 運單號 ----
  function renderTn(){
    var box = el('tnList'); box.innerHTML = '';
    state.trackingNos.forEach(function(tn, i){
      var d = document.createElement('div'); d.className = 'tn-item';
      d.innerHTML = '<span>' + tn + '</span>';
      var del = document.createElement('button'); del.className = 'del'; del.textContent = '✕';
      del.onclick = function(){ state.trackingNos.splice(i,1); renderTn(); };
      d.appendChild(del); box.appendChild(d);
    });
  }
  function addTn(raw){
    var v = String(raw || '').trim().toUpperCase().replace(/\s+/g,'');
    if (!v) return;
    if (state.trackingNos.indexOf(v) !== -1) { toast('這筆運單已經加過了'); return; }
    state.trackingNos.push(v); renderTn();
  }
  el('tnAdd').addEventListener('click', function(){ addTn(el('tnInput').value); el('tnInput').value=''; });
  el('tnInput').addEventListener('keydown', function(e){ if (e.key === 'Enter'){ e.preventDefault(); el('tnAdd').click(); } });

  el('scanBtn').addEventListener('click', function(){
    if (!liff.scanCodeV2) { toast('這支手機不支援掃碼，請直接打字'); return; }
    liff.scanCodeV2().then(function(r){
      if (r && r.value) { addTn(r.value); toast('掃到：' + r.value); }
      else { toast('沒掃到，再試一次或直接打字'); }
    }).catch(function(){ toast('掃碼取消／不支援，請直接打字'); });
  });

  // ---- 照片（壓縮後存 base64）----
  function resizeToDataUrl(file, maxSide, quality){
    return new Promise(function(resolve, reject){
      var reader = new FileReader();
      reader.onload = function(){
        var img = new Image();
        img.onload = function(){
          var w = img.width, h = img.height;
          if (w > h && w > maxSide){ h = Math.round(h * maxSide / w); w = maxSide; }
          else if (h >= w && h > maxSide){ w = Math.round(w * maxSide / h); h = maxSide; }
          var c = document.createElement('canvas'); c.width = w; c.height = h;
          c.getContext('2d').drawImage(img, 0, 0, w, h);
          resolve(c.toDataURL('image/jpeg', quality));
        };
        img.onerror = reject; img.src = reader.result;
      };
      reader.onerror = reject; reader.readAsDataURL(file);
    });
  }
  function renderPhotos(){
    var area = el('photoArea');
    Array.prototype.forEach.call(area.querySelectorAll('.photo-thumb'), function(n){ n.remove(); });
    var addBtn = area.querySelector('.add-photo');
    state.photos.forEach(function(data, i){
      var t = document.createElement('div'); t.className = 'photo-thumb';
      var im = document.createElement('img'); im.src = data; t.appendChild(im);
      var del = document.createElement('button'); del.className = 'del'; del.textContent = '✕';
      del.onclick = function(){ state.photos.splice(i,1); renderPhotos(); };
      t.appendChild(del);
      area.insertBefore(t, addBtn);
    });
    addBtn.style.display = state.photos.length >= 4 ? 'none' : 'flex';
  }
  el('photoInput').addEventListener('change', function(e){
    var files = Array.prototype.slice.call(e.target.files || []);
    e.target.value = '';
    var room = 4 - state.photos.length;
    if (room <= 0) { toast('最多 4 張'); return; }
    files = files.slice(0, room);
    Promise.all(files.map(function(f){ return resizeToDataUrl(f, 1024, 0.6); }))
      .then(function(urls){ urls.forEach(function(u){ state.photos.push(u); }); renderPhotos(); })
      .catch(function(){ toast('照片處理失敗'); });
  });

  // ---- 送出 ----
  el('submitBtn').addEventListener('click', function(){
    if (!state.type) { toast('先選問題類型'); return; }
    if (state.type !== '未到貨' && state.trackingNos.length === 0 && state.photos.length === 0) {
      toast('至少掃一個運單號或拍一張照片'); return;
    }
    var btn = el('submitBtn'); btn.disabled = true; btn.textContent = '送出中…';
    fetch(API_URL, {
      method:'POST',
      headers:{ 'Content-Type':'application/json' },
      body: JSON.stringify({
        type: state.type,
        qty: state.qty,
        trackingNos: state.trackingNos,
        photos: state.photos,
        note: el('noteInput').value || '',
        groupId: GROUP_ID,
        userName: state.profile ? state.profile.displayName : '',
        idToken: state.idToken,
      }),
    }).then(function(r){ return r.json().then(function(j){ return { ok:r.ok, j:j }; }); })
      .then(function(res){
        if (!res.ok || !res.j.ok) { throw new Error(res.j && res.j.error ? res.j.error : '送出失敗'); }
        showDone(res.j);
      })
      .catch(function(err){ toast('送出失敗：' + err.message); btn.disabled = false; btn.textContent = '送出回報'; });
  });

  function showDone(data){
    hide('form'); hide('submitBar'); show('done');
    var n = data.created || 0;
    el('doneTitle').textContent = '回報完成！';
    el('doneSub').textContent = state.type + '　共 ' + n + ' 筆運單' + (data.photoCount ? '　含 ' + data.photoCount + ' 張照片' : '');
    var box = el('doneDetail'); box.innerHTML = '';
    (data.results || []).forEach(function(r){
      var li = document.createElement('div'); li.className = 'li';
      if (!r.trackingNo) li.textContent = '• （未填運單號，主管稍後確認）';
      else if (r.found) li.textContent = '• ' + r.trackingNo + '　' + (r.productName || '(未帶出商品)') + (r.suspected ? '（疑似比對）' : '');
      else li.textContent = '• ' + r.trackingNo + '　找不到運單，主管稍後確認';
      box.appendChild(li);
    });
    if (!(data.results || []).length) box.innerHTML = '<div class="li">已送出</div>';
  }

  el('closeBtn').addEventListener('click', function(){
    if (liff.isInClient && liff.isInClient()) liff.closeWindow();
    else location.reload();
  });
  el('againBtn').addEventListener('click', function(){
    state.type=''; state.qty=1; state.trackingNos=[]; state.photos=[];
    Array.prototype.forEach.call(document.querySelectorAll('.type-btn'), function(b){ b.classList.remove('on'); });
    renderQty(); renderTn(); renderPhotos(); el('noteInput').value=''; show('qtyCard');
    var btn = el('submitBtn'); btn.disabled=false; btn.textContent='送出回報';
    hide('done'); show('form'); show('submitBar'); window.scrollTo(0,0);
  });
})();
</script>
</body>
</html>
