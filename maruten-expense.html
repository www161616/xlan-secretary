<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>丸十支出</title>
<script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<style>
  /* 主題與框架沿用 staff.html，保持兩個 LIFF 表單視覺一致。 */
  :root{
    --page:#FFFBEB; --soft:#FEF3C7; --line:#FCD34D; --primary:#F59E0B;
    --primary-dark:#92400E; --text:#1F2937; --muted:#6B7280; --danger:#DC2626;
    --ok:#16A34A; --white:#fff;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang TC","Microsoft JhengHei",sans-serif;
    background:var(--page); color:var(--text); font-size:17px; line-height:1.5;
    padding:16px 16px 120px; max-width:520px; margin:0 auto;
  }
  h1{font-size:22px; color:var(--primary-dark); margin:4px 0 2px; display:flex; align-items:center; gap:8px;}
  .sub{color:var(--muted); font-size:14px; margin:0 0 16px;}
  .who{font-size:13px; color:var(--muted); margin-bottom:14px;}
  /* 持久錯誤橫幅：可被選取複製（讓老闆能複製群組ID去設定），與會自動消失的 toast 互補。 */
  .form-err{background:#FEE2E2; border:1px solid var(--danger); color:#991B1B; border-radius:12px;
            padding:12px 14px; margin:0 0 16px; font-size:14px; line-height:1.6; white-space:pre-line;
            -webkit-user-select:text; user-select:text;}
  .card{background:var(--white); border:1px solid var(--line); border-radius:16px; padding:16px; margin-bottom:16px; box-shadow:0 1px 0 rgba(146,64,14,.04);}
  .label{font-weight:700; color:var(--primary-dark); margin:0 0 10px; font-size:16px;}
  .req::after{content:" *"; color:var(--danger);}

  /* 分類：用按鈕格選擇（手指好按），實際值存進 state.category。 */
  .cat-grid{display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px;}
  .cat-btn{border:2px solid var(--line); background:var(--page); color:var(--text); border-radius:14px; padding:16px 6px; font-size:16px; font-weight:700; cursor:pointer; transition:all .12s;}
  .cat-btn.on{background:var(--primary); border-color:var(--primary); color:#fff; box-shadow:0 6px 16px rgba(245,158,11,.35);}

  input[type=text], input[type=number], textarea{
    width:100%; border:2px solid var(--line); border-radius:12px; padding:12px; font-size:16px;
    font-family:inherit; background:var(--white); color:var(--text);
  }
  input:focus, textarea:focus{outline:none; border-color:var(--primary);}
  .amount-input{font-size:24px; font-weight:800; letter-spacing:.5px;}
  textarea{min-height:64px; resize:vertical;}
  .hint{color:var(--muted); font-size:13px; margin-top:8px;}

  .photo-area{display:flex; flex-wrap:wrap; gap:10px; margin-top:4px;}
  .photo-thumb{position:relative; width:84px; height:84px; border-radius:12px; overflow:hidden; border:1px solid var(--line);}
  .photo-thumb img{width:100%; height:100%; object-fit:cover; display:block;}
  .photo-thumb .del{position:absolute; top:2px; right:2px; width:24px; height:24px; border-radius:50%; border:none; background:rgba(0,0,0,.55); color:#fff; font-size:15px; cursor:pointer; line-height:24px; text-align:center; padding:0;}
  .add-photo{width:84px; height:84px; border-radius:12px; border:2px dashed var(--line); background:var(--page); color:var(--muted); font-size:30px; cursor:pointer; display:flex; align-items:center; justify-content:center;}

  .submit-bar{position:fixed; left:0; right:0; bottom:0; padding:12px 16px calc(12px + env(safe-area-inset-bottom)); background:linear-gradient(to top,var(--page) 70%,transparent); }
  .submit-bar .inner{max-width:520px; margin:0 auto;}
  .submit-btn{width:100%; border:none; background:var(--primary); color:#fff; border-radius:16px; padding:17px; font-size:20px; font-weight:800; cursor:pointer; box-shadow:0 6px 16px rgba(245,158,11,.4);}
  .submit-btn:disabled{opacity:.55; box-shadow:none;}
  .toast{position:fixed; left:50%; bottom:96px; transform:translateX(-50%); background:#111827; color:#fff; padding:11px 18px; border-radius:999px; font-size:14px; opacity:0; transition:opacity .2s; pointer-events:none; z-index:50; max-width:90%; text-align:center;}
  .toast.show{opacity:.95;}
  .hidden{display:none !important;}
  #done{text-align:center; padding-top:40px;}
  #done .big{font-size:64px;}
  #done h2{color:var(--ok); font-size:24px; margin:12px 0 6px;}
  #done .detail{background:var(--white); border:1px solid var(--line); border-radius:14px; padding:14px; text-align:left; margin:16px 0; font-size:15px;}
  #done .detail .li{padding:6px 0; border-bottom:1px dashed var(--line); display:flex; justify-content:space-between; gap:12px;}
  #done .detail .li:last-child{border-bottom:none;}
  #done .detail .k{color:var(--muted); flex:0 0 auto;}
  #done .detail .v{color:var(--text); font-weight:700; text-align:right; word-break:break-all;}
  #done .warn{color:var(--danger); font-size:13px; margin:0 0 8px;}
  .ghost-btn{width:100%; border:2px solid var(--primary); background:var(--white); color:var(--primary-dark); border-radius:14px; padding:14px; font-size:17px; font-weight:700; cursor:pointer; margin-top:10px;}
  .loading{text-align:center; color:var(--muted); padding:60px 0;}
  .spinner{width:40px;height:40px;border:4px solid var(--soft);border-top-color:var(--primary);border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 14px;}
  @keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>
<body>

<div id="boot" class="loading">
  <div class="spinner"></div>
  載入中…
</div>

<!-- 表單 -->
<div id="form" class="hidden">
  <h1>🧾 丸十支出</h1>
  <p class="sub">選分類、填金額，拍張收據存證就好。</p>
  <p class="who" id="who"></p>
  <!-- 持久錯誤橫幅：未設定主體等需要「看得到、複製得到」的訊息（toast 會自動消失，不夠用）。 -->
  <p class="form-err hidden" id="formErr"></p>

  <!-- 分類（必填，下拉/按鈕格） -->
  <div class="card">
    <p class="label req">分類</p>
    <div class="cat-grid" id="catGrid"></div>
  </div>

  <!-- 項目（必填） -->
  <div class="card">
    <p class="label req">項目（買了什麼）</p>
    <input type="text" id="itemInput" inputmode="text" placeholder="例：員工便當、青菜一箱、宅配運費" />
  </div>

  <!-- 金額（必填） -->
  <div class="card">
    <p class="label req">金額</p>
    <input type="number" id="amountInput" class="amount-input" inputmode="numeric" min="1" step="1" placeholder="0" />
  </div>

  <!-- 備註（選填） -->
  <div class="card">
    <p class="label">備註（可不填）</p>
    <textarea id="memoInput" placeholder="補充說明，例如：付現／找廠商王先生"></textarea>
  </div>

  <!-- 收據照片（選填，最多 4 張） -->
  <div class="card">
    <p class="label">收據・發票照片（可拍、最多 4 張）</p>
    <div class="photo-area" id="ppArea">
      <label class="add-photo">＋
        <input type="file" id="ppInput" accept="image/*" capture="environment" multiple class="hidden" />
      </label>
    </div>
    <p class="hint">拍清楚一點，存進雲端硬碟備查。</p>
  </div>
</div>

<!-- 完成頁 -->
<div id="done" class="hidden">
  <div class="big">✅</div>
  <h2 id="doneTitle">已記到丸十支出表！</h2>
  <p class="warn hidden" id="doneWarn"></p>
  <div class="detail" id="doneDetail"></div>
  <button class="submit-btn" id="closeBtn">關閉</button>
  <button class="ghost-btn" id="againBtn">再記一筆</button>
</div>

<div class="submit-bar hidden" id="submitBar">
  <div class="inner">
    <button class="submit-btn" id="submitBtn">送出記帳</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
(function(){
  var qs = new URLSearchParams(location.search);
  var GROUP_ID = qs.get('g') || '';
  var API_URL = '/api/maruten-expense-form';
  // 後備 LIFF ID（LIFF ID 非機密；正常會由後端 GET 回傳）。＝已註冊的真 LIFF app，後端 GET 失敗時的最後防線。
  var FALLBACK_LIFF_ID = '2009806013-sND5Erbq';
  // 分類清單後備：後端 GET 沒回時用這份（與後端 EXPENSE_CATEGORIES 一致）。
  var FALLBACK_CATEGORIES = ['餐飲', '進貨食材', '運費', '雜支', '水電', '其他'];

  var state = { category:'', receiptPhotos:[], profile:null, idToken:'' };

  var el = function(id){ return document.getElementById(id); };
  function toast(msg){
    var t = el('toast'); t.textContent = msg; t.classList.add('show');
    clearTimeout(toast._t); toast._t = setTimeout(function(){ t.classList.remove('show'); }, 2200);
  }
  function show(id){ el(id).classList.remove('hidden'); }
  function hide(id){ el(id).classList.add('hidden'); }

  // ---- 渲染分類按鈕格 ----
  function renderCategories(cats){
    var grid = el('catGrid'); grid.innerHTML = '';
    (cats || FALLBACK_CATEGORIES).forEach(function(name){
      var b = document.createElement('button');
      b.className = 'cat-btn'; b.type = 'button'; b.textContent = name;
      b.addEventListener('click', function(){
        state.category = name;
        Array.prototype.forEach.call(grid.querySelectorAll('.cat-btn'), function(x){ x.classList.remove('on'); });
        b.classList.add('on');
      });
      grid.appendChild(b);
    });
  }

  // ---- 啟動 ----
  // 先跟後端拿 LIFF ID 與分類清單（單一來源），再 init。
  // 不能直接讀網址 ?liff=，因為 LIFF 開啟時參數會被包進 liff.state，init 前讀不到。
  fetch(API_URL, { method:'GET' })
    .then(function(r){ return r.json(); })
    .then(function(cfg){
      renderCategories(cfg && cfg.categories);
      var liffId = String((cfg && cfg.liffId) || qs.get('liff') || FALLBACK_LIFF_ID || '').trim();
      if (!liffId) throw new Error('沒有 LIFF ID');
      return liff.init({ liffId: liffId });
    })
    .then(function(){
      if (!liff.isLoggedIn()) { liff.login(); return; }
      try {
        var ctx = liff.getContext();
        if (ctx && (ctx.groupId || ctx.roomId)) GROUP_ID = ctx.groupId || ctx.roomId;
      } catch (e) {}
      var p = liff.getProfile().catch(function(){ return null; });
      var idt = Promise.resolve(liff.getIDToken && liff.getIDToken());
      return Promise.all([p, idt]).then(function(arr){
        state.profile = arr[0];
        state.idToken = arr[1] || '';
        el('who').textContent = state.profile ? ('記錄人：' + state.profile.displayName) : '';
        hide('boot'); show('form'); show('submitBar');
      });
    })
    .catch(function(e){
      // 後端沒回分類也要能顯示（用後備清單）；只有 LIFF init 失敗才停在這。
      if (!el('catGrid').children.length) renderCategories(FALLBACK_CATEGORIES);
      el('boot').innerHTML = '⚠️ 載入失敗：' + (e && e.message ? e.message : e) +
        '<br><br>請確認這是從 LINE 開啟，或 LIFF 設定正確。';
    });

  // ---- 照片：壓縮（與 staff.html resizeToDataUrl 同）----
  function resizeToDataUrl(file, maxSide, quality){
    return new Promise(function(resolve, reject){
      var reader = new FileReader();
      reader.onload = function(){
        var img = new Image();
        img.onload = function(){
          var w = img.width, h = img.height;
          if (w > h && w > maxSide){ h = Math.round(h * maxSide / w); w = maxSide; }
          else if (h >= w && h > maxSide){ w = Math.round(w * maxSide / h); h = maxSide; }
          var c = document.createElement('canvas'); c.width = w; c.height = h;
          c.getContext('2d').drawImage(img, 0, 0, w, h);
          resolve(c.toDataURL('image/jpeg', quality));
        };
        img.onerror = reject; img.src = reader.result;
      };
      reader.onerror = reject; reader.readAsDataURL(file);
    });
  }

  // ---- 收據照片（最多 4 張，與 staff.html 問題照片同邏輯）----
  function renderPp(){
    var area = el('ppArea');
    Array.prototype.forEach.call(area.querySelectorAll('.photo-thumb'), function(n){ n.remove(); });
    var addBtn = area.querySelector('.add-photo');
    state.receiptPhotos.forEach(function(data, i){
      var t = document.createElement('div'); t.className = 'photo-thumb';
      var im = document.createElement('img'); im.src = data; t.appendChild(im);
      var del = document.createElement('button'); del.className = 'del'; del.textContent = '✕';
      del.onclick = function(){ state.receiptPhotos.splice(i,1); renderPp(); };
      t.appendChild(del);
      area.insertBefore(t, addBtn);
    });
    addBtn.style.display = state.receiptPhotos.length >= 4 ? 'none' : 'flex';
  }
  el('ppInput').addEventListener('change', function(e){
    var files = Array.prototype.slice.call(e.target.files || []);
    e.target.value = '';
    var room = 4 - state.receiptPhotos.length;
    if (room <= 0) { toast('最多 4 張'); return; }
    files = files.slice(0, room);
    Promise.all(files.map(function(f){ return resizeToDataUrl(f, 1280, 0.7); }))
      .then(function(urls){ urls.forEach(function(u){ state.receiptPhotos.push(u); }); renderPp(); })
      .catch(function(){ toast('照片處理失敗'); });
  });

  // ---- 送出 ----
  el('submitBtn').addEventListener('click', function(){
    if (!state.category) { toast('先選一個分類'); return; }
    var item = (el('itemInput').value || '').trim();
    if (!item) { toast('請填項目（買了什麼）'); el('itemInput').focus(); return; }
    var amount = Number((el('amountInput').value || '').replace(/[,，\s]/g, ''));
    if (!(amount > 0)) { toast('請填金額（大於 0）'); el('amountInput').focus(); return; }

    hide('formErr');   // 重送前先清掉上一輪的持久錯誤橫幅
    var btn = el('submitBtn'); btn.disabled = true; btn.textContent = '送出中…';
    fetch(API_URL, {
      method:'POST',
      headers:{ 'Content-Type':'application/json' },
      body: JSON.stringify({
        分類: state.category,
        項目: item,
        金額: amount,
        備註: (el('memoInput').value || '').trim(),
        收據照: state.receiptPhotos,
        groupId: GROUP_ID,
        userName: state.profile ? state.profile.displayName : '',
        idToken: state.idToken,
      }),
    }).then(function(r){ return r.json().then(function(j){ return { ok:r.ok, j:j }; }); })
      .then(function(res){
        if (!res.ok || !res.j.ok) {
          var msg = (res.j && res.j.error) ? res.j.error : '送出失敗';
          // 未設定主體：後端會回 groupId，需「持久顯示＋可複製」讓管理員拿去設定（光靠會消失的 toast 不夠）。
          if (res.j && Object.prototype.hasOwnProperty.call(res.j, 'groupId')) {
            el('formErr').textContent = msg; show('formErr'); window.scrollTo(0,0);
          }
          throw new Error(msg);
        }
        showDone(res.j);
      })
      .catch(function(err){ toast('送出失敗：' + err.message); btn.disabled = false; btn.textContent = '送出記帳'; });
  });

  function showDone(data){
    hide('form'); hide('submitBar'); show('done');
    if (data.sheetWarning) { el('doneWarn').textContent = '⚠️ ' + data.sheetWarning; show('doneWarn'); }
    else hide('doneWarn');
    var rows = [
      ['主體', data.entity || '丸十'],
      ['分類', data.category || ''],
      ['項目', data.note || ''],
      ['金額', 'NT$ ' + (Number(data.amount) || 0).toLocaleString()],
      ['記錄人', data.recorder || ''],
      ['日期', data.dateText || ''],
    ];
    if (data.memo) rows.push(['備註', data.memo]);
    // P2-1：有照片上傳失敗時，完成頁明確顯示「N 張（M/總 失敗）」，別讓使用者以為全成功。
    var failed = data.receiptFailedCount || 0;
    var okCount = data.receiptCount || 0;
    var photoText = okCount + ' 張';
    if (failed > 0) photoText += '（' + failed + '/' + (okCount + failed) + ' 上傳失敗）';
    rows.push(['收據照片', photoText]);
    var box = el('doneDetail'); box.innerHTML = '';
    rows.forEach(function(kv){
      var li = document.createElement('div'); li.className = 'li';
      var k = document.createElement('span'); k.className = 'k'; k.textContent = kv[0];
      var v = document.createElement('span'); v.className = 'v'; v.textContent = kv[1];
      li.appendChild(k); li.appendChild(v); box.appendChild(li);
    });
  }

  el('closeBtn').addEventListener('click', function(){
    if (liff.isInClient && liff.isInClient()) liff.closeWindow();
    else location.reload();
  });
  el('againBtn').addEventListener('click', function(){
    state = { category:'', receiptPhotos:[], profile:state.profile, idToken:state.idToken };
    Array.prototype.forEach.call(el('catGrid').querySelectorAll('.cat-btn'), function(b){ b.classList.remove('on'); });
    el('itemInput').value=''; el('amountInput').value=''; el('memoInput').value='';
    renderPp();
    var btn = el('submitBtn'); btn.disabled=false; btn.textContent='送出記帳';
    hide('formErr');
    hide('done'); show('form'); show('submitBar'); window.scrollTo(0,0);
  });
})();
</script>
</body>
</html>
