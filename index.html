<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>小瀾秘書</title>
<script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html, body { height:100%; overflow:hidden; }
body { font-family:-apple-system,'Segoe UI',sans-serif; background:#f5f0ff; color:#2d2d3a; display:flex; flex-direction:column; }

/* Header */
.header { background:#fff; padding:16px 20px; display:flex; align-items:center; justify-content:space-between; border-bottom:1px solid #e8e0f0; flex-shrink:0; }
.header .logo { font-size:18px; font-weight:700; color:#9b6dff; }
.header .user { font-size:12px; color:#8b8b9e; }

/* Pages */
.pages { flex:1; overflow-y:auto; -webkit-overflow-scrolling:touch; }
.page { display:none; padding:16px; padding-bottom:80px; min-height:100%; }
.page.active { display:block; }
.page-title { font-size:20px; font-weight:700; margin-bottom:16px; display:flex; align-items:center; gap:8px; color:#3d3552; }
.page-title .badge { background:#9b6dff; color:#fff; font-size:12px; padding:2px 10px; border-radius:12px; font-weight:600; }

/* Bottom Nav */
.bottom-nav { position:fixed; bottom:0; left:0; right:0; background:#fff; border-top:1px solid #e8e0f0; display:flex; z-index:50; padding-bottom:env(safe-area-inset-bottom); flex-shrink:0; overflow-x:auto; -webkit-overflow-scrolling:touch; }
.bottom-nav::-webkit-scrollbar { display:none; }
.nav-btn { flex:0 0 auto; min-width:60px; display:flex; flex-direction:column; align-items:center; padding:10px 6px 8px; cursor:pointer; color:#b0a8c0; font-size:9px; gap:4px; transition:color .15s; }
.nav-btn .icon { font-size:22px; }
.nav-btn.active { color:#9b6dff; }

/* Card */
.card { background:#fff; border:1px solid #e8e0f0; border-radius:14px; padding:16px; margin-bottom:10px; }
.card-shadow { box-shadow:0 2px 10px rgba(155,109,255,.1); }

/* Stat Cards */
.stat-row { display:flex; gap:10px; margin-bottom:16px; }
.stat-card { flex:1; background:#fff; border:1px solid #e8e0f0; border-radius:14px; padding:14px; text-align:center; }
.stat-card .label { font-size:11px; color:#8b8b9e; }
.stat-card .value { font-size:22px; font-weight:700; margin-top:4px; }
.stat-card .value.green { color:#22c55e; }
.stat-card .value.red { color:#ef4444; }
.stat-card .value.blue { color:#6366f1; }

/* Todo Item */
.todo-card { display:flex; align-items:flex-start; gap:14px; }
.todo-check { width:28px; height:28px; border:2px solid #d4c8e8; border-radius:8px; flex-shrink:0; margin-top:2px; display:flex; align-items:center; justify-content:center; cursor:pointer; font-size:14px; }
.todo-check:active { background:#e8dbff; }
.todo-check.done { background:#9b6dff; border-color:#9b6dff; color:#fff; }
.todo-text { flex:1; font-size:15px; line-height:1.4; color:#3d3552; }
.todo-meta { font-size:11px; color:#a09ab0; margin-top:4px; }
.todo-del { color:#c4bdd4; font-size:22px; cursor:pointer; padding:4px; }

/* Collapsible */
.collapse-header { display:flex; align-items:center; gap:8px; padding:12px 0; color:#8b8b9e; font-size:13px; cursor:pointer; }
.collapse-header .arrow { transition:transform .2s; }
.collapse-header.open .arrow { transform:rotate(90deg); }
.collapse-body { display:none; }
.collapse-body.open { display:block; }

/* Note Card */
.note-content { font-size:14px; line-height:1.5; white-space:pre-wrap; color:#3d3552; }
.note-tags { display:flex; gap:6px; flex-wrap:wrap; margin-top:10px; }
.note-tag { background:#f0e8ff; color:#7c5cbf; padding:3px 10px; border-radius:6px; font-size:11px; }
.note-footer { display:flex; justify-content:space-between; align-items:center; margin-top:10px; }
.note-date { font-size:11px; color:#a09ab0; }
.note-del { color:#ef4444; font-size:12px; cursor:pointer; padding:4px 8px; }

/* Tab bar */
.tab-bar { display:flex; background:#ede5f7; border-radius:10px; padding:3px; margin-bottom:16px; }
.tab { flex:1; text-align:center; padding:10px; border-radius:8px; font-size:14px; color:#8b7aa8; cursor:pointer; font-weight:500; }
.tab.active { background:#9b6dff; color:#fff; }

/* Controls */
.controls { display:flex; gap:10px; margin-bottom:16px; }
.controls input, .controls select { flex:1; background:#fff; border:1px solid #e8e0f0; color:#3d3552; padding:12px; border-radius:10px; font-size:14px; }
.btn { background:#9b6dff; color:#fff; border:none; padding:12px 20px; border-radius:10px; font-size:14px; font-weight:600; cursor:pointer; min-height:48px; }
.btn:active { background:#8559e6; }
.btn-sm { padding:8px 14px; font-size:12px; min-height:36px; }
.btn-outline { background:transparent; border:1px solid #d4c8e8; color:#8b7aa8; }
.btn-danger { background:#ef4444; }

/* Expense Item */
.exp-item { display:flex; justify-content:space-between; align-items:center; padding:14px 0; border-bottom:1px solid #f0e8ff; }
.exp-left { flex:1; }
.exp-cat { font-size:14px; font-weight:500; color:#3d3552; }
.exp-note { font-size:12px; color:#a09ab0; margin-top:2px; }
.exp-right { text-align:right; }
.exp-amt { font-size:16px; font-weight:700; }
.exp-date { font-size:11px; color:#a09ab0; margin-top:2px; }

/* Event group */
.event-group-title { font-size:13px; color:#9b6dff; font-weight:600; padding:10px 0 6px; border-bottom:1px solid #e8e0f0; margin-bottom:8px; margin-top:12px; }
.event-item { display:flex; gap:12px; padding:10px 0; }
.event-time { font-size:13px; color:#8b8b9e; width:50px; flex-shrink:0; }
.event-title { font-size:14px; flex:1; color:#3d3552; }
.event-loc { font-size:12px; color:#a09ab0; margin-top:2px; }

/* Recurring */
.rec-card { display:flex; justify-content:space-between; align-items:center; }
.rec-info { flex:1; }
.rec-title { font-size:15px; font-weight:500; color:#3d3552; }
.rec-detail { font-size:12px; color:#8b8b9e; margin-top:4px; }
.rec-amount { font-size:16px; font-weight:700; color:#9b6dff; }
.rec-actions { display:flex; gap:8px; margin-top:10px; }

/* Modal */
.modal-bg { position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,.3); display:none; align-items:flex-end; justify-content:center; z-index:100; }
.modal-bg.show { display:flex; }
.modal { background:#fff; border-top-left-radius:20px; border-top-right-radius:20px; padding:24px 20px 40px; width:100%; max-width:500px; }
.modal h3 { margin-bottom:16px; font-size:18px; color:#3d3552; }
.modal .form-group { margin-bottom:14px; }
.modal .form-group label { font-size:12px; color:#8b8b9e; display:block; margin-bottom:6px; }
.modal .form-group input, .modal .form-group select { width:100%; background:#f9f5ff; border:1px solid #e8e0f0; color:#3d3552; padding:12px; border-radius:10px; font-size:14px; }
.modal .form-row { display:flex; gap:10px; }
.modal .form-row > div { flex:1; }
.modal .btn-row { display:flex; gap:10px; margin-top:20px; }
.modal .btn-row .btn { flex:1; }

/* Empty state */
.empty { text-align:center; padding:40px 20px; color:#b0a8c0; font-size:14px; }
</style>
</head>
<body>

<div class="header">
  <div class="logo">小瀾秘書</div>
  <div class="user" id="user-name"></div>
</div>

<div class="pages">
  <!-- 待辦 -->
  <div id="page-todos" class="page active">
    <div class="page-title" style="justify-content:space-between;"><div>待辦清單 <span class="badge" id="todo-badge">0</span></div><button class="btn btn-sm btn-outline" onclick="exportTodos()">CSV</button></div>
    <div id="todo-pending"></div>
    <div class="collapse-header" id="done-header" onclick="toggleDone()">
      <span class="arrow">&#9654;</span> 已完成
    </div>
    <div class="collapse-body" id="done-body"></div>
  </div>

  <!-- 記事 -->
  <div id="page-notes" class="page">
    <div class="page-title">記事本</div>
    <div id="notes-list"></div>
  </div>

  <!-- 帳務 -->
  <div id="page-expenses" class="page">
    <div class="page-title">帳務</div>
    <div class="tab-bar" id="exp-tabs">
      <div class="tab active" onclick="switchExpenseTab('personal')">私人</div>
      <div class="tab" onclick="switchExpenseTab('business')">公司</div>
    </div>
    <div class="controls">
      <input type="month" id="expense-month" onchange="loadExpenses()">
      <button class="btn btn-sm btn-outline" onclick="exportCSV()">CSV</button>
    </div>
    <div class="stat-row">
      <div class="stat-card"><div class="label">收入</div><div class="value green" id="exp-income">$0</div></div>
      <div class="stat-card"><div class="label">支出</div><div class="value red" id="exp-expense">$0</div></div>
      <div class="stat-card"><div class="label">淨額</div><div class="value blue" id="exp-net">$0</div></div>
    </div>
    <div id="exp-list"></div>
  </div>

  <!-- 行程 -->
  <div id="page-events" class="page">
    <div class="page-title">行程</div>
    <div class="controls">
      <input type="month" id="event-month" onchange="loadEvents()">
    </div>
    <div id="event-list"></div>
  </div>

  <!-- 定期付款 -->
  <div id="page-recurring" class="page">
    <div class="page-title">定期付款</div>
    <button class="btn" onclick="showRecurringForm()" style="width:100%;margin-bottom:16px;">+ 新增定期付款</button>
    <div id="recurring-list"></div>
  </div>

  <!-- 陸貨 -->
  <div id="page-shipments" class="page">
    <div class="page-title">陸貨追蹤 <span class="badge" id="ship-badge">0</span></div>
    <div id="ship-pending"></div>
    <div class="collapse-header" id="ship-arrived-header" onclick="toggleArrivedShips()">
      <span class="arrow">&#9654;</span> 已到貨
    </div>
    <div class="collapse-body" id="ship-arrived-body"></div>
  </div>

  <!-- 付款 -->
  <div id="page-payables" class="page">
    <div class="page-title">應付款 <span class="badge" id="pay-badge">0</span></div>
    <div id="pay-pending"></div>
    <div class="collapse-header" id="pay-done-header" onclick="togglePaidPayables()">
      <span class="arrow">&#9654;</span> 已付款
    </div>
    <div class="collapse-body" id="pay-done-body"></div>
  </div>

  <!-- 專案 -->
  <div id="page-projects" class="page">
    <div class="page-title">專案管理</div>
    <div id="project-list"></div>
    <div id="project-detail" style="display:none;"></div>
  </div>

  <!-- 廠商 -->
  <div id="page-vendors" class="page">
    <div class="page-title">廠商資料</div>
    <div id="vendor-list"></div>
  </div>

  <!-- Bug 追蹤 -->
  <div id="page-bugs" class="page">
    <div class="page-title">Bug 追蹤 <span class="badge" id="bug-badge">0</span></div>
    <div id="bugs-pending"></div>
    <div class="collapse-header" id="bugs-fixed-header" onclick="toggleFixedBugs()">
      <span class="arrow">&#9654;</span> 已修復
    </div>
    <div class="collapse-body" id="bugs-fixed-body"></div>
  </div>
</div>

<!-- Bottom Nav -->
<div class="bottom-nav">
  <div class="nav-btn active" onclick="switchPage('todos')"><span class="icon">&#9745;</span>待辦</div>
  <div class="nav-btn" onclick="switchPage('notes')"><span class="icon">&#9997;</span>記事</div>
  <div class="nav-btn" onclick="switchPage('expenses')"><span class="icon">&#128176;</span>帳務</div>
  <div class="nav-btn" onclick="switchPage('events')"><span class="icon">&#128197;</span>行程</div>
  <div class="nav-btn" onclick="switchPage('recurring')"><span class="icon">&#128260;</span>定期</div>
  <div class="nav-btn" onclick="switchPage('shipments')"><span class="icon">&#128230;</span>陸貨</div>
  <div class="nav-btn" onclick="switchPage('payables')"><span class="icon">&#128184;</span>付款</div>
  <div class="nav-btn" onclick="switchPage('projects')"><span class="icon">&#128193;</span>專案</div>
  <div class="nav-btn" onclick="switchPage('vendors')"><span class="icon">&#127981;</span>廠商</div>
  <div class="nav-btn" onclick="switchPage('bugs')"><span class="icon">&#128027;</span>Bug</div>
</div>

<!-- Modal -->
<div class="modal-bg" id="recurring-modal">
  <div class="modal">
    <h3>新增定期付款</h3>
    <div class="form-group"><label>名稱</label><input id="rf-title" placeholder="例如：房租"></div>
    <div class="form-row">
      <div class="form-group"><label>金額</label><input id="rf-amount" type="number" placeholder="28000"></div>
      <div class="form-group"><label>帳務</label><select id="rf-account"><option value="personal">私人</option><option value="business">公司</option></select></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>頻率</label><select id="rf-freq"><option value="monthly">每月</option><option value="yearly">每年</option></select></div>
      <div class="form-group"><label>幾號</label><input id="rf-day" type="number" min="1" max="31" placeholder="5"></div>
      <div class="form-group"><label>月份</label><input id="rf-month" type="number" min="1" max="12" placeholder="年付填"></div>
    </div>
    <div class="form-group"><label>備註</label><input id="rf-note" placeholder="選填"></div>
    <div class="btn-row">
      <button class="btn" onclick="saveRecurring()">儲存</button>
      <button class="btn btn-outline" onclick="hideRecurringForm()">取消</button>
    </div>
  </div>
</div>

<script>
const SB_URL = 'https://asugjynpocwygggttxyo.supabase.co/rest/v1';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFzdWdqeW5wb2N3eWdnZ3R0eHlvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzNzU3MjksImV4cCI6MjA4ODk1MTcyOX0.LzcRQAl80rZxKKD8NIYWGvylfwCbs1ek5LtKpmZodBc';
const H = { 'apikey':SB_KEY, 'Authorization':'Bearer '+SB_KEY, 'Content-Type':'application/json', 'Prefer':'return=minimal' };
const HR = { 'apikey':SB_KEY, 'Authorization':'Bearer '+SB_KEY };

async function api(path, opts={}) {
  const res = await fetch(SB_URL+path, { headers:opts.body?H:HR, ...opts });
  if (opts.method==='DELETE'||opts.method==='PATCH') return null;
  return res.json();
}

// --- LIFF ---
liff.init({ liffId:'2009806013-ON2KtCsF' }).then(async () => {
  if (liff.isLoggedIn()) {
    try {
      const profile = await liff.getProfile();
      document.getElementById('user-name').textContent = profile.displayName;
    } catch(e) { console.error('profile error', e); }
  }
}).catch(e => console.error('LIFF init error', e));

// --- Navigation ---
const pages = ['todos','notes','expenses','events','recurring','shipments','payables','projects','vendors','bugs'];
function switchPage(name) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(n => n.classList.remove('active'));
  document.getElementById('page-'+name).classList.add('active');
  const idx = pages.indexOf(name);
  const navBtns = document.querySelectorAll('.nav-btn');
  if (navBtns[idx]) navBtns[idx].classList.add('active');
  const loaders = {todos:loadTodos,notes:loadNotes,expenses:loadExpenses,events:loadEvents,recurring:loadRecurring,shipments:loadShipments,payables:loadPayables,projects:loadProjects,vendors:loadVendors,bugs:loadBugs};
  if (loaders[name]) loaders[name]();
}

// --- Todos ---
async function loadTodos() {
  const data = await api('/xlan_todos?order=created_at.asc&limit=200');
  const pending = data.filter(t=>!t.done);
  const done = data.filter(t=>t.done).slice(-20).reverse();
  document.getElementById('todo-badge').textContent = pending.length;

  const urgent = pending.filter(t=>t.priority==='urgent');
  const important = pending.filter(t=>t.priority==='important');
  const normal = pending.filter(t=>!t.priority||t.priority==='normal');

  function renderGroup(label, items, color) {
    if (items.length===0) return '';
    return `<div style="font-size:13px;font-weight:600;color:${color};padding:8px 0 4px;">${label}（${items.length}）</div>`+
      items.map(t=>{
        const src = t.source_person ? `<span style="color:#9b6dff;">[${esc(t.source_person)}]</span> ` : '';
        return `<div class="card card-shadow" style="margin-bottom:8px;border-left:3px solid ${color};">
          <div class="todo-card">
            <div class="todo-check" onclick="toggleTodo('${t.id}',true)"></div>
            <div class="todo-text">${src}${esc(t.text)}<div class="todo-meta">${t.source_group?'群組':'私訊'} &middot; ${fmtDate(t.created_at)}</div></div>
            <div class="todo-del" onclick="delTodo('${t.id}')">&times;</div>
          </div>
        </div>`;
      }).join('');
  }

  const html = renderGroup('🔴 緊急', urgent, '#ef4444') + renderGroup('🟡 重要', important, '#f59e0b') + renderGroup('⚪ 一般', normal, '#a09ab0');
  document.getElementById('todo-pending').innerHTML = html || '<div class="empty">沒有待辦事項</div>';

  document.getElementById('done-body').innerHTML = done.map(t=>`
    <div class="card" style="margin-bottom:8px;opacity:.5;">
      <div class="todo-card">
        <div class="todo-check done">&#10003;</div>
        <div class="todo-text" style="text-decoration:line-through;">${esc(t.text)}<div class="todo-meta">完成於 ${fmtDate(t.done_at||t.created_at)}</div></div>
      </div>
    </div>`).join('');
}

let doneOpen = false;
function toggleDone() {
  doneOpen = !doneOpen;
  document.getElementById('done-header').classList.toggle('open', doneOpen);
  document.getElementById('done-body').classList.toggle('open', doneOpen);
}

async function toggleTodo(id, done) {
  await api('/xlan_todos?id=eq.'+id, { method:'PATCH', body:JSON.stringify({ done, done_at:new Date().toISOString() }) });
  loadTodos();
}
async function delTodo(id) {
  if (!confirm('確定刪除？')) return;
  await api('/xlan_todos?id=eq.'+id, { method:'DELETE' });
  loadTodos();
}

// --- Notes ---
async function loadNotes() {
  const data = await api('/xlan_notes?order=created_at.desc&limit=100');
  document.getElementById('notes-list').innerHTML = data.map(n=>{
    const preview = n.content.length>50 ? n.content.substring(0,50)+'...' : n.content;
    return `<div class="card card-shadow" style="margin-bottom:10px;">
      <div class="note-content">${esc(preview)}</div>
      <div class="note-tags">${(n.tags||[]).map(t=>'<span class="note-tag">'+esc(t)+'</span>').join('')}</div>
      <div class="note-footer"><span class="note-date">${fmtDate(n.created_at)}</span><span class="note-del" onclick="delNote('${n.id}')">刪除</span></div>
    </div>`;
  }).join('') || '<div class="empty">還沒有筆記</div>';
}
async function delNote(id) {
  if (!confirm('確定刪除？')) return;
  await api('/xlan_notes?id=eq.'+id, { method:'DELETE' });
  loadNotes();
}

// --- Expenses ---
let expAccount='personal', expData=[];
function switchExpenseTab(account) {
  expAccount = account;
  document.querySelectorAll('#exp-tabs .tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('#exp-tabs .tab')[account==='personal'?0:1].classList.add('active');
  renderExpenses();
}
async function loadExpenses() {
  const m = document.getElementById('expense-month').value;
  if (!m) return;
  const [y,mo] = m.split('-').map(Number);
  const start = new Date(y,mo-1,1).toISOString();
  const end = new Date(y,mo,1).toISOString();
  expData = await api('/xlan_expenses?created_at=gte.'+start+'&created_at=lt.'+end+'&order=created_at.desc');
  renderExpenses();
}
function renderExpenses() {
  const filtered = expData.filter(e=>e.account===expAccount);
  const income = filtered.filter(e=>e.type==='income').reduce((s,e)=>s+e.amount,0);
  const expense = filtered.filter(e=>e.type==='expense').reduce((s,e)=>s+e.amount,0);
  document.getElementById('exp-income').textContent = '$'+income.toLocaleString();
  document.getElementById('exp-expense').textContent = '$'+expense.toLocaleString();
  document.getElementById('exp-net').textContent = '$'+(income-expense).toLocaleString();

  document.getElementById('exp-list').innerHTML = filtered.map(e=>{
    const color = e.type==='income'?'#4ade80':'#f87171';
    const sign = e.type==='income'?'+':'-';
    return `<div class="exp-item">
      <div class="exp-left"><div class="exp-cat">${esc(e.category)}</div><div class="exp-note">${esc(e.note||'')}</div></div>
      <div class="exp-right"><div class="exp-amt" style="color:${color}">${sign}$${e.amount.toLocaleString()}</div><div class="exp-date">${fmtDate(e.created_at)}</div></div>
    </div>`;
  }).join('') || '<div class="empty">無記錄</div>';
}
function exportCSV() {
  const filtered = expData.filter(e=>e.account===expAccount);
  if (!filtered.length) return alert('無資料');
  let csv = '\uFEFF時間,類別,備註,類型,金額\n';
  filtered.forEach(e=>{
    csv += fmtDate(e.created_at)+','+e.category+','+(e.note||'').replace(/,/g,'，')+','+(e.type==='income'?'收入':'支出')+','+e.amount+'\n';
  });
  const blob = new Blob([csv],{type:'text/csv;charset=utf-8;'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = '帳務_'+expAccount+'_'+document.getElementById('expense-month').value+'.csv';
  a.click();
}

// --- Events ---
async function loadEvents() {
  const m = document.getElementById('event-month').value;
  if (!m) return;
  const [y,mo] = m.split('-').map(Number);
  const sm = y+'-'+String(mo).padStart(2,'0');
  const nmo = mo===12 ? (y+1)+'-01' : y+'-'+String(mo+1).padStart(2,'0');
  const data = await api('/xlan_events?date=gte.'+sm+'-01&date=lt.'+nmo+'-01&order=date.asc,time.asc');

  if (!data.length) { document.getElementById('event-list').innerHTML='<div class="empty">無行程</div>'; return; }

  // group by date
  const groups = {};
  data.forEach(e=>{ if(!groups[e.date]) groups[e.date]=[]; groups[e.date].push(e); });

  let html = '';
  Object.keys(groups).sort().forEach(date=>{
    const weekday = ['日','一','二','三','四','五','六'][new Date(date).getDay()];
    html += '<div class="event-group-title">'+date+' ('+weekday+')</div>';
    groups[date].forEach(e=>{
      html += '<div class="event-item"><div class="event-time">'+(e.time||'全天')+'</div><div><div class="event-title">'+esc(e.title)+'</div>'+(e.location?'<div class="event-loc">'+esc(e.location)+'</div>':'')+'</div></div>';
    });
  });
  document.getElementById('event-list').innerHTML = html;
}

// --- Recurring ---
async function loadRecurring() {
  const data = await api('/xlan_recurring?active=eq.true&order=day_of_month.asc');
  const today = new Date();
  const todayDate = today.getDate();
  const todayMonth = today.getMonth()+1;

  document.getElementById('recurring-list').innerHTML = data.map(r=>{
    const freq = r.frequency==='yearly' ? '每年'+r.month_of_year+'月' : '每月';
    const acct = r.account==='business' ? '公司' : '私人';

    // 計算下次到期
    let nextDue = '';
    if (r.frequency==='monthly') {
      if (r.day_of_month >= todayDate) nextDue = todayMonth+'/'+r.day_of_month;
      else nextDue = (todayMonth%12+1)+'/'+r.day_of_month;
    } else {
      nextDue = r.month_of_year+'/'+r.day_of_month;
    }

    return `<div class="card card-shadow" style="margin-bottom:10px;">
      <div class="rec-card">
        <div class="rec-info">
          <div class="rec-title">${esc(r.title)}</div>
          <div class="rec-detail">${freq}${r.day_of_month}號 &middot; ${acct} &middot; 下次：${nextDue}</div>
        </div>
        <div class="rec-amount">${r.amount?'$'+r.amount.toLocaleString():'-'}</div>
      </div>
      <div class="rec-actions">
        <button class="btn btn-sm btn-outline" onclick="toggleRecurring('${r.id}')">停用</button>
      </div>
    </div>`;
  }).join('') || '<div class="empty">無定期付款</div>';
}

function showRecurringForm(){document.getElementById('recurring-modal').classList.add('show');}
function hideRecurringForm(){document.getElementById('recurring-modal').classList.remove('show');}

async function saveRecurring() {
  const body = {
    title:document.getElementById('rf-title').value,
    amount:parseInt(document.getElementById('rf-amount').value)||null,
    account:document.getElementById('rf-account').value,
    frequency:document.getElementById('rf-freq').value,
    day_of_month:parseInt(document.getElementById('rf-day').value),
    month_of_year:parseInt(document.getElementById('rf-month').value)||null,
    note:document.getElementById('rf-note').value||null,
  };
  if (!body.title||!body.day_of_month) return alert('請填寫名稱和日期');
  await fetch(SB_URL+'/xlan_recurring',{method:'POST',headers:H,body:JSON.stringify(body)});
  hideRecurringForm();
  ['rf-title','rf-amount','rf-day','rf-month','rf-note'].forEach(id=>document.getElementById(id).value='');
  loadRecurring();
}
async function toggleRecurring(id) {
  await api('/xlan_recurring?id=eq.'+id,{method:'PATCH',body:JSON.stringify({active:false})});
  loadRecurring();
}

// --- Shipments ---
let shipsArrivedOpen = false;
function toggleArrivedShips() {
  shipsArrivedOpen = !shipsArrivedOpen;
  document.getElementById('ship-arrived-header').classList.toggle('open', shipsArrivedOpen);
  document.getElementById('ship-arrived-body').classList.toggle('open', shipsArrivedOpen);
}
async function loadShipments() {
  const data = await api('/xlan_shipments?order=expected_date.asc&limit=100');
  const pending = data.filter(s=>s.status==='pending');
  const arrived = data.filter(s=>s.status==='arrived').slice(-20).reverse();
  document.getElementById('ship-badge').textContent = pending.length;
  const today = new Date().toISOString().split('T')[0];

  document.getElementById('ship-pending').innerHTML = pending.map(s=>{
    const diff = Math.round((new Date(s.expected_date)-new Date(today))/86400000);
    const when = diff===0?'今天到':diff===1?'明天到':diff<0?'已遲'+(-diff)+'天':diff+'天後';
    const color = diff<=1?'#ef4444':diff<=3?'#f59e0b':'#a09ab0';
    return `<div class="card card-shadow" style="margin-bottom:10px;border-left:3px solid ${color};">
      <div style="display:flex;justify-content:space-between;align-items:center;">
        <div><div style="font-size:14px;font-weight:500;color:#3d3552;">${esc(s.title)}</div>
        <div style="font-size:12px;color:#8b8b9e;margin-top:2px;">預計 ${s.expected_date}（${when}）</div>
        ${s.note?'<div style="font-size:11px;color:#a09ab0;margin-top:2px;">'+esc(s.note)+'</div>':''}</div>
        <button class="btn btn-sm" onclick="arriveShip('${s.id}')" style="min-height:32px;padding:4px 12px;font-size:12px;">已到貨</button>
      </div>
    </div>`;
  }).join('') || '<div class="empty">沒有待到貨物</div>';

  document.getElementById('ship-arrived-body').innerHTML = arrived.map(s=>`
    <div class="card" style="margin-bottom:8px;opacity:.6;">
      <div style="font-size:14px;color:#8b8b9e;">${esc(s.title)}</div>
      <div style="font-size:11px;color:#a09ab0;margin-top:4px;">到貨於 ${fmtDate(s.arrived_at||s.created_at)}</div>
    </div>`).join('');
}
async function arriveShip(id) {
  await api('/xlan_shipments?id=eq.'+id, { method:'PATCH', body:JSON.stringify({ status:'arrived', arrived_at:new Date().toISOString() }) });
  loadShipments();
}

// --- Payables ---
let paidOpen = false;
function togglePaidPayables() {
  paidOpen = !paidOpen;
  document.getElementById('pay-done-header').classList.toggle('open', paidOpen);
  document.getElementById('pay-done-body').classList.toggle('open', paidOpen);
}
async function loadPayables() {
  const data = await api('/xlan_payables?order=due_date.asc.nullslast&limit=100');
  const pending = data.filter(p=>p.status==='pending');
  const paid = data.filter(p=>p.status==='paid').slice(-20).reverse();
  document.getElementById('pay-badge').textContent = pending.length;
  const today = new Date().toISOString().split('T')[0];

  document.getElementById('pay-pending').innerHTML = pending.map(p=>{
    let dueLine = '';
    if (p.due_date) {
      const diff = Math.round((new Date(p.due_date)-new Date(today))/86400000);
      const when = diff===0?'今天到期':diff===1?'明天到期':diff<0?'已過期'+(-diff)+'天':diff+'天後到期';
      dueLine = `<div style="font-size:12px;color:${diff<=1?'#ef4444':'#8b8b9e'};margin-top:2px;">${p.due_date}（${when}）</div>`;
    }
    const amt = p.amount?'$'+p.amount.toLocaleString():'';
    return `<div class="card card-shadow" style="margin-bottom:10px;">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;">
        <div><div style="font-size:14px;font-weight:500;color:#3d3552;">${esc(p.title)}</div>
        <div style="font-size:12px;color:#9b6dff;margin-top:2px;">付給 ${esc(p.to_whom)} ${amt}</div>
        ${dueLine}
        ${p.note?'<div style="font-size:11px;color:#a09ab0;margin-top:2px;">'+esc(p.note)+'</div>':''}</div>
        <button class="btn btn-sm" onclick="markPaid('${p.id}',${p.amount||0},'${esc(p.title)}')" style="min-height:32px;padding:4px 12px;font-size:12px;">已付</button>
      </div>
    </div>`;
  }).join('') || '<div class="empty">沒有待付款項</div>';

  document.getElementById('pay-done-body').innerHTML = paid.map(p=>`
    <div class="card" style="margin-bottom:8px;opacity:.6;">
      <div style="font-size:14px;color:#8b8b9e;">${esc(p.title)} — 付給 ${esc(p.to_whom)} ${p.amount?'$'+p.amount.toLocaleString():''}</div>
      <div style="font-size:11px;color:#a09ab0;margin-top:4px;">付款於 ${fmtDate(p.paid_at||p.created_at)}</div>
    </div>`).join('');
}
async function markPaid(id, amount, title) {
  await api('/xlan_payables?id=eq.'+id, { method:'PATCH', body:JSON.stringify({ status:'paid', paid_at:new Date().toISOString() }) });
  // 同步存入 xlan_expenses
  if (amount > 0) {
    await fetch(SB_URL+'/xlan_expenses', { method:'POST', headers:H, body:JSON.stringify({ amount, category:'其他', note:'應付款：'+title, type:'expense', account:'business' }) });
  }
  loadPayables();
}

// --- Projects ---
let currentProjectId = null;
async function loadProjects() {
  currentProjectId = null;
  document.getElementById('project-detail').style.display = 'none';
  const data = await api('/xlan_projects?status=eq.active&order=created_at.desc');
  if (!data.length) { document.getElementById('project-list').innerHTML='<div class="empty">沒有進行中的專案</div>'; return; }

  const cards = [];
  for (const p of data) {
    const todos = await api('/xlan_todos?project_id=eq.'+p.id+'&order=created_at.asc');
    const done = todos.filter(t=>t.done).length;
    const total = todos.length;
    const pct = total>0?Math.round(done/total*100):0;
    const barW = pct+'%';
    cards.push(`<div class="card card-shadow" style="margin-bottom:10px;cursor:pointer;" onclick="openProject('${p.id}')">
      <div style="font-size:15px;font-weight:600;color:#3d3552;">${esc(p.name)}</div>
      ${p.description?'<div style="font-size:12px;color:#8b8b9e;margin-top:4px;">'+esc(p.description)+'</div>':''}
      <div style="margin-top:10px;background:#ede5f7;border-radius:6px;height:8px;overflow:hidden;">
        <div style="background:#9b6dff;height:100%;width:${barW};border-radius:6px;transition:width .3s;"></div>
      </div>
      <div style="display:flex;justify-content:space-between;margin-top:6px;font-size:11px;color:#8b8b9e;">
        <span>${done}/${total} 完成</span><span>${pct}%</span>
      </div>
    </div>`);
  }
  document.getElementById('project-list').innerHTML = cards.join('');
}

async function openProject(id) {
  currentProjectId = id;
  const projs = await api('/xlan_projects?id=eq.'+id);
  if (!projs.length) return;
  const proj = projs[0];
  const todos = await api('/xlan_todos?project_id=eq.'+id+'&order=created_at.asc');
  const done = todos.filter(t=>t.done);
  const pending = todos.filter(t=>!t.done);

  document.getElementById('project-list').innerHTML = '';
  document.getElementById('project-detail').style.display = 'block';
  document.getElementById('project-detail').innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
      <div style="font-size:18px;font-weight:700;color:#3d3552;">${esc(proj.name)}</div>
      <div style="display:flex;gap:8px;">
        <button class="btn btn-sm btn-outline" onclick="loadProjects()">返回</button>
        <button class="btn btn-sm" onclick="completeProject('${id}')">完成專案</button>
      </div>
    </div>
    ${pending.map(t=>`<div class="card" style="margin-bottom:8px;display:flex;align-items:center;gap:12px;">
      <div class="todo-check" onclick="toggleProjectTodo('${t.id}','${id}')"></div>
      <div style="flex:1;font-size:14px;">${esc(t.text)}</div>
    </div>`).join('')}
    ${done.length>0?'<div style="margin-top:12px;font-size:12px;color:#8b8b9e;">已完成</div>':''}
    ${done.map(t=>`<div class="card" style="margin-bottom:6px;opacity:.5;display:flex;align-items:center;gap:12px;">
      <div class="todo-check done">&#10003;</div>
      <div style="flex:1;font-size:14px;text-decoration:line-through;">${esc(t.text)}</div>
    </div>`).join('')}
  `;
}

async function toggleProjectTodo(todoId, projId) {
  await api('/xlan_todos?id=eq.'+todoId, { method:'PATCH', body:JSON.stringify({ done:true, done_at:new Date().toISOString() }) });
  openProject(projId);
}

async function completeProject(id) {
  if (!confirm('確定完成此專案？')) return;
  await api('/xlan_projects?id=eq.'+id, { method:'PATCH', body:JSON.stringify({ status:'completed' }) });
  loadProjects();
}

// --- Bugs ---
let bugsFixedOpen = false;
function toggleFixedBugs() {
  bugsFixedOpen = !bugsFixedOpen;
  document.getElementById('bugs-fixed-header').classList.toggle('open', bugsFixedOpen);
  document.getElementById('bugs-fixed-body').classList.toggle('open', bugsFixedOpen);
}
async function loadBugs() {
  const data = await api('/xlan_bugs?order=created_at.desc&limit=100');
  const pending = data.filter(b=>b.status==='pending');
  const fixed = data.filter(b=>b.status==='fixed');
  document.getElementById('bug-badge').textContent = pending.length;

  document.getElementById('bugs-pending').innerHTML = pending.map(b=>`
    <div class="card card-shadow" style="margin-bottom:10px;border-left:3px solid #ef4444;">
      <div style="font-size:14px;color:#3d3552;">${esc(b.description)}</div>
      <div style="display:flex;justify-content:space-between;align-items:center;margin-top:8px;">
        <span style="font-size:11px;color:#a09ab0;">${b.reporter?esc(b.reporter)+'・':''}${fmtDate(b.created_at)}</span>
        <button class="btn btn-sm" onclick="fixBug('${b.id}')" style="min-height:32px;padding:4px 12px;font-size:12px;">標記修復</button>

      <div style="font-size:11px;color:#a09ab0;margin-top:4px;">修復於 ${fmtDate(b.fixed_at||b.created_at)}</div>
    </div>`).join('');

async function fixBug(id) {
  await api('/xlan_bugs?id=eq.'+id, { method:'PATCH', body:JSON.stringify({ status:'fixed', fixed_at:new Date().toISOString() }) });
  loadBugs();
}

// --- Export ---
async function exportTodos() {
  const data = await api('/xlan_todos?done=eq.false&order=created_at.asc');
  if (!data.length) return alert('無資料');
  let csv = '\uFEFF建立時間,內容,優先度,來源,狀態\n';
  data.forEach(t=>{
    const pri = {urgent:'緊急',important:'重要',normal:'一般'}[t.priority||'normal'];
    csv += fmtDate(t.created_at)+','+t.text.replace(/,/g,'，')+','+pri+','+(t.source_person||'')+',未完成\n';
  });
  const blob = new Blob([csv],{type:'text/csv;charset=utf-8;'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  const d = new Date();
  a.download = '小瀾待辦_'+d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')+'.csv';
  a.click();
}

// --- Utils ---
function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML;}
function fmtDate(s){if(!s)return'';return new Date(s).toLocaleString('zh-TW',{timeZone:'Asia/Taipei',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'});}

// --- Init ---
const now=new Date();
const ym=now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0');
document.getElementById('expense-month').value=ym;
document.getElementById('event-month').value=ym;
loadTodos();
