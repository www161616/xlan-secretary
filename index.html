<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>小瀾秘書 Dashboard</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: -apple-system, 'Segoe UI', sans-serif; background:#0f1117; color:#e4e4e7; display:flex; min-height:100vh; }

/* Sidebar */
.sidebar { width:220px; background:#1a1b23; border-right:1px solid #2a2b35; display:flex; flex-direction:column; position:fixed; height:100vh; }
.sidebar-header { padding:20px; border-bottom:1px solid #2a2b35; }
.sidebar-header h1 { font-size:18px; color:#8b5cf6; }
.sidebar-header p { font-size:11px; color:#71717a; margin-top:4px; }
.nav-item { padding:12px 20px; cursor:pointer; display:flex; align-items:center; gap:10px; font-size:14px; color:#a1a1aa; transition:all .15s; border-left:3px solid transparent; }
.nav-item:hover { background:#2a2b35; color:#e4e4e7; }
.nav-item.active { background:#2a2b35; color:#8b5cf6; border-left-color:#8b5cf6; }

/* Main */
.main { margin-left:220px; flex:1; padding:24px; }
.page { display:none; }
.page.active { display:block; }
.page-title { font-size:22px; font-weight:700; margin-bottom:20px; }

/* Cards */
.stat-row { display:flex; gap:16px; margin-bottom:24px; flex-wrap:wrap; }
.stat-card { background:#1a1b23; border:1px solid #2a2b35; border-radius:12px; padding:20px; flex:1; min-width:180px; }
.stat-card .label { font-size:12px; color:#71717a; text-transform:uppercase; letter-spacing:1px; }
.stat-card .value { font-size:28px; font-weight:700; margin-top:8px; }
.stat-card .value.green { color:#4ade80; }
.stat-card .value.red { color:#f87171; }
.stat-card .value.blue { color:#60a5fa; }

/* Table */
.data-table { width:100%; border-collapse:collapse; }
.data-table th { text-align:left; padding:10px 12px; font-size:12px; color:#71717a; text-transform:uppercase; letter-spacing:1px; border-bottom:1px solid #2a2b35; }
.data-table td { padding:10px 12px; border-bottom:1px solid #1e1f29; font-size:14px; }
.data-table tr:hover { background:#1a1b23; }

/* Todo */
.todo-cols { display:flex; gap:24px; }
.todo-col { flex:1; }
.todo-col h3 { font-size:14px; color:#71717a; margin-bottom:12px; text-transform:uppercase; letter-spacing:1px; }
.todo-item { background:#1a1b23; border:1px solid #2a2b35; border-radius:8px; padding:12px; margin-bottom:8px; display:flex; align-items:flex-start; gap:10px; }
.todo-item .check { width:20px; height:20px; border:2px solid #3f3f46; border-radius:4px; cursor:pointer; flex-shrink:0; margin-top:2px; display:flex; align-items:center; justify-content:center; }
.todo-item .check:hover { border-color:#8b5cf6; }
.todo-item .check.done { background:#8b5cf6; border-color:#8b5cf6; }
.todo-item .text { flex:1; }
.todo-item .meta { font-size:11px; color:#52525b; margin-top:4px; }
.todo-item .del { color:#52525b; cursor:pointer; font-size:18px; }
.todo-item .del:hover { color:#f87171; }

/* Notes */
.note-card { background:#1a1b23; border:1px solid #2a2b35; border-radius:8px; padding:16px; margin-bottom:10px; }
.note-card .content { white-space:pre-wrap; line-height:1.5; }
.note-card .tags { margin-top:8px; display:flex; gap:6px; flex-wrap:wrap; }
.note-card .tag { background:#2a2b35; color:#a78bfa; padding:2px 8px; border-radius:4px; font-size:11px; }
.note-card .footer { display:flex; justify-content:space-between; margin-top:8px; font-size:11px; color:#52525b; }

/* Tabs */
.tab-bar { display:flex; gap:0; margin-bottom:20px; border-bottom:1px solid #2a2b35; }
.tab { padding:10px 20px; cursor:pointer; font-size:14px; color:#71717a; border-bottom:2px solid transparent; }
.tab:hover { color:#e4e4e7; }
.tab.active { color:#8b5cf6; border-bottom-color:#8b5cf6; }

/* Controls */
.controls { display:flex; gap:12px; margin-bottom:20px; align-items:center; flex-wrap:wrap; }
.controls select, .controls input, .controls button { background:#1a1b23; border:1px solid #2a2b35; color:#e4e4e7; padding:8px 12px; border-radius:6px; font-size:13px; }
.controls button { background:#8b5cf6; border:none; cursor:pointer; font-weight:600; }
.controls button:hover { background:#7c3aed; }
.btn-danger { background:#dc2626 !important; }
.btn-danger:hover { background:#b91c1c !important; }

/* Recurring form */
.form-row { display:flex; gap:12px; margin-bottom:12px; flex-wrap:wrap; }
.form-row label { font-size:12px; color:#71717a; display:block; margin-bottom:4px; }
.form-row input, .form-row select { background:#1a1b23; border:1px solid #2a2b35; color:#e4e4e7; padding:8px; border-radius:6px; font-size:13px; width:100%; }
.modal-bg { position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,.6); display:none; align-items:center; justify-content:center; z-index:100; }
.modal-bg.show { display:flex; }
.modal { background:#1a1b23; border:1px solid #2a2b35; border-radius:12px; padding:24px; width:420px; max-width:90vw; }
.modal h3 { margin-bottom:16px; }
</style>
</head>
<body>
<div class="sidebar">
  <div class="sidebar-header">
    <h1>小瀾秘書</h1>
    <p>Dashboard</p>
  </div>
  <div class="nav-item active" onclick="switchPage('todos')">📋 待辦清單</div>
  <div class="nav-item" onclick="switchPage('notes')">📝 記事本</div>
  <div class="nav-item" onclick="switchPage('expenses')">💰 帳務</div>
  <div class="nav-item" onclick="switchPage('events')">📅 行程</div>
  <div class="nav-item" onclick="switchPage('recurring')">🔁 定期付款</div>
</div>

<div class="main">
  <!-- 待辦清單 -->
  <div id="page-todos" class="page active">
    <div class="page-title">📋 待辦清單</div>
    <div class="todo-cols">
      <div class="todo-col">
        <h3>未完成 (<span id="todo-pending-count">0</span>)</h3>
        <div id="todo-pending"></div>
      </div>
      <div class="todo-col">
        <h3>已完成</h3>
        <div id="todo-done"></div>
      </div>
    </div>
  </div>

  <!-- 記事本 -->
  <div id="page-notes" class="page">
    <div class="page-title">📝 記事本</div>
    <div id="notes-list"></div>
  </div>

  <!-- 帳務 -->
  <div id="page-expenses" class="page">
    <div class="page-title">💰 帳務</div>
    <div class="tab-bar">
      <div class="tab active" onclick="switchExpenseTab('personal')">私人</div>
      <div class="tab" onclick="switchExpenseTab('business')">公司</div>
    </div>
    <div class="controls">
      <input type="month" id="expense-month" onchange="loadExpenses()">
      <button onclick="exportCSV()">📥 匯出 CSV</button>
    </div>
    <div class="stat-row">
      <div class="stat-card"><div class="label">總收入</div><div class="value green" id="exp-income">NT$ 0</div></div>
      <div class="stat-card"><div class="label">總支出</div><div class="value red" id="exp-expense">NT$ 0</div></div>
      <div class="stat-card"><div class="label">淨額</div><div class="value blue" id="exp-net">NT$ 0</div></div>
    </div>
    <table class="data-table">
      <thead><tr><th>時間</th><th>類別</th><th>備註</th><th>金額</th></tr></thead>
      <tbody id="exp-table"></tbody>
    </table>
  </div>

  <!-- 行程 -->
  <div id="page-events" class="page">
    <div class="page-title">📅 行程</div>
    <div class="controls">
      <input type="month" id="event-month" onchange="loadEvents()">
    </div>
    <table class="data-table">
      <thead><tr><th>日期</th><th>時間</th><th>標題</th><th>地點</th></tr></thead>
      <tbody id="event-table"></tbody>
    </table>
  </div>

  <!-- 定期付款 -->
  <div id="page-recurring" class="page">
    <div class="page-title">🔁 定期付款</div>
    <div class="controls">
      <button onclick="showRecurringForm()">+ 新增</button>
    </div>
    <table class="data-table">
      <thead><tr><th>名稱</th><th>金額</th><th>頻率</th><th>日期</th><th>帳務</th><th>操作</th></tr></thead>
      <tbody id="recurring-table"></tbody>
    </table>
  </div>
</div>

<!-- 新增定期付款 Modal -->
<div class="modal-bg" id="recurring-modal">
  <div class="modal">
    <h3>新增定期付款</h3>
    <div class="form-row"><div style="flex:1"><label>名稱</label><input id="rf-title"></div></div>
    <div class="form-row">
      <div style="flex:1"><label>金額</label><input id="rf-amount" type="number"></div>
      <div style="flex:1"><label>帳務</label><select id="rf-account"><option value="personal">私人</option><option value="business">公司</option></select></div>
    </div>
    <div class="form-row">
      <div style="flex:1"><label>頻率</label><select id="rf-freq"><option value="monthly">每月</option><option value="yearly">每年</option></select></div>
      <div style="flex:1"><label>幾號</label><input id="rf-day" type="number" min="1" max="31"></div>
      <div style="flex:1"><label>幾月（年付）</label><input id="rf-month" type="number" min="1" max="12"></div>
    </div>
    <div class="form-row"><div style="flex:1"><label>備註</label><input id="rf-note"></div></div>
    <div style="display:flex;gap:12px;margin-top:16px;">
      <button onclick="saveRecurring()" style="background:#8b5cf6;border:none;color:#fff;padding:8px 20px;border-radius:6px;cursor:pointer;">儲存</button>
      <button onclick="hideRecurringForm()" style="background:#2a2b35;border:none;color:#a1a1aa;padding:8px 20px;border-radius:6px;cursor:pointer;">取消</button>
    </div>
  </div>
</div>

<script>
const SB_URL = 'https://asugjynpocwygggttxyo.supabase.co/rest/v1';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFzdWdqeW5wb2N3eWdnZ3R0eHlvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzNzU3MjksImV4cCI6MjA4ODk1MTcyOX0.LzcRQAl80rZxKKD8NIYWGvylfwCbs1ek5LtKpmZodBc';
const H = { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY, 'Content-Type': 'application/json', 'Prefer': 'return=minimal' };
const HR = { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY };

async function api(path, opts = {}) {
  const res = await fetch(SB_URL + path, { headers: opts.body ? H : HR, ...opts });
  if (opts.method === 'DELETE' || opts.method === 'PATCH') return null;
  return res.json();
}

// --- Navigation ---
function switchPage(name) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.getElementById('page-' + name).classList.add('active');
  document.querySelectorAll('.nav-item')[['todos','notes','expenses','events','recurring'].indexOf(name)].classList.add('active');
  if (name === 'todos') loadTodos();
  if (name === 'notes') loadNotes();
  if (name === 'expenses') loadExpenses();
  if (name === 'events') loadEvents();
  if (name === 'recurring') loadRecurring();
}

// --- Todos ---
async function loadTodos() {
  const data = await api('/xlan_todos?order=created_at.asc&limit=200');
  const pending = data.filter(t => !t.done);
  const done = data.filter(t => t.done).slice(-30).reverse();
  document.getElementById('todo-pending-count').textContent = pending.length;

  document.getElementById('todo-pending').innerHTML = pending.map(t => `
    <div class="todo-item">
      <div class="check" onclick="toggleTodo('${t.id}',true)"></div>
      <div class="text">${esc(t.text)}<div class="meta">${t.source_group ? '群組' : '私訊'} · ${fmtDate(t.created_at)}</div></div>
      <div class="del" onclick="delTodo('${t.id}')">&times;</div>
    </div>`).join('') || '<div style="color:#52525b;padding:12px;">沒有待辦事項 🎉</div>';

  document.getElementById('todo-done').innerHTML = done.map(t => `
    <div class="todo-item" style="opacity:.5;">
      <div class="check done">✓</div>
      <div class="text" style="text-decoration:line-through;">${esc(t.text)}<div class="meta">${fmtDate(t.done_at||t.created_at)}</div></div>
      <div class="del" onclick="delTodo('${t.id}')">&times;</div>
    </div>`).join('');
}

async function toggleTodo(id, done) {
  await api('/xlan_todos?id=eq.' + id, { method: 'PATCH', body: JSON.stringify({ done, done_at: new Date().toISOString() }) });
  loadTodos();
}

async function delTodo(id) {
  if (!confirm('確定刪除？')) return;
  await api('/xlan_todos?id=eq.' + id, { method: 'DELETE' });
  loadTodos();
}

// --- Notes ---
async function loadNotes() {
  const data = await api('/xlan_notes?order=created_at.desc&limit=100');
  document.getElementById('notes-list').innerHTML = data.map(n => `
    <div class="note-card">
      <div class="content">${esc(n.content)}</div>
      <div class="tags">${(n.tags||[]).map(t=>'<span class="tag">'+esc(t)+'</span>').join('')}</div>
      <div class="footer"><span>${fmtDate(n.created_at)}</span><span class="del" style="cursor:pointer;color:#52525b;" onclick="delNote('${n.id}')">&times; 刪除</span></div>
    </div>`).join('') || '<div style="color:#52525b;padding:12px;">還沒有筆記</div>';
}

async function delNote(id) {
  if (!confirm('確定刪除？')) return;
  await api('/xlan_notes?id=eq.' + id, { method: 'DELETE' });
  loadNotes();
}

// --- Expenses ---
let expAccount = 'personal';
let expData = [];

function switchExpenseTab(account) {
  expAccount = account;
  document.querySelectorAll('#page-expenses .tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('#page-expenses .tab')[account === 'personal' ? 0 : 1].classList.add('active');
  renderExpenses();
}

async function loadExpenses() {
  const m = document.getElementById('expense-month').value;
  if (!m) return;
  const [y, mo] = m.split('-').map(Number);
  const start = new Date(y, mo - 1, 1).toISOString();
  const end = new Date(y, mo, 1).toISOString();
  expData = await api(`/xlan_expenses?created_at=gte.${start}&created_at=lt.${end}&order=created_at.desc`);
  renderExpenses();
}

function renderExpenses() {
  const filtered = expData.filter(e => e.account === expAccount);
  const income = filtered.filter(e => e.type === 'income').reduce((s, e) => s + e.amount, 0);
  const expense = filtered.filter(e => e.type === 'expense').reduce((s, e) => s + e.amount, 0);
  document.getElementById('exp-income').textContent = 'NT$ ' + income.toLocaleString();
  document.getElementById('exp-expense').textContent = 'NT$ ' + expense.toLocaleString();
  document.getElementById('exp-net').textContent = 'NT$ ' + (income - expense).toLocaleString();

  document.getElementById('exp-table').innerHTML = filtered.map(e => {
    const color = e.type === 'income' ? '#4ade80' : '#f87171';
    const sign = e.type === 'income' ? '+' : '-';
    return `<tr><td>${fmtDate(e.created_at)}</td><td>${esc(e.category)}</td><td>${esc(e.note||'')}</td><td style="color:${color};font-weight:600;">${sign} NT$${e.amount.toLocaleString()}</td></tr>`;
  }).join('') || '<tr><td colspan="4" style="color:#52525b;">無記錄</td></tr>';
}

function exportCSV() {
  const filtered = expData.filter(e => e.account === expAccount);
  if (filtered.length === 0) return alert('無資料');
  let csv = '\uFEFF時間,類別,備註,類型,金額\n';
  filtered.forEach(e => {
    csv += `${fmtDate(e.created_at)},${e.category},${(e.note||'').replace(/,/g,'，')},${e.type === 'income' ? '收入' : '支出'},${e.amount}\n`;
  });
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `帳務_${expAccount}_${document.getElementById('expense-month').value}.csv`;
  a.click();
}

// --- Events ---
async function loadEvents() {
  const m = document.getElementById('event-month').value;
  if (!m) return;
  const [y, mo] = m.split('-').map(Number);
  const startMonth = `${y}-${String(mo).padStart(2,'0')}`;
  const data = await api(`/xlan_events?date=gte.${startMonth}-01&date=lt.${y}-${String(mo+1).padStart(2,'0')}-01&order=date.asc,time.asc`);
  document.getElementById('event-table').innerHTML = data.map(e =>
    `<tr><td>${e.date}</td><td>${e.time||'全天'}</td><td>${esc(e.title)}</td><td>${esc(e.location||'')}</td></tr>`
  ).join('') || '<tr><td colspan="4" style="color:#52525b;">無行程</td></tr>';
}

// --- Recurring ---
async function loadRecurring() {
  const data = await api('/xlan_recurring?active=eq.true&order=day_of_month.asc');
  document.getElementById('recurring-table').innerHTML = data.map(r => {
    const freq = r.frequency === 'yearly' ? `每年${r.month_of_year}月` : '每月';
    const acct = r.account === 'business' ? '公司' : '私人';
    return `<tr>
      <td>${esc(r.title)}</td>
      <td>${r.amount ? 'NT$' + r.amount.toLocaleString() : '-'}</td>
      <td>${freq}</td>
      <td>${r.day_of_month}號</td>
      <td>${acct}</td>
      <td>
        <span style="cursor:pointer;color:#f87171;" onclick="toggleRecurring('${r.id}')">停用</span>
        <span style="cursor:pointer;color:#52525b;margin-left:8px;" onclick="delRecurring('${r.id}')">&times;</span>
      </td>
    </tr>`;
  }).join('') || '<tr><td colspan="6" style="color:#52525b;">無定期付款</td></tr>';
}

function showRecurringForm() { document.getElementById('recurring-modal').classList.add('show'); }
function hideRecurringForm() { document.getElementById('recurring-modal').classList.remove('show'); }

async function saveRecurring() {
  const body = {
    title: document.getElementById('rf-title').value,
    amount: parseInt(document.getElementById('rf-amount').value) || null,
    account: document.getElementById('rf-account').value,
    frequency: document.getElementById('rf-freq').value,
    day_of_month: parseInt(document.getElementById('rf-day').value),
    month_of_year: parseInt(document.getElementById('rf-month').value) || null,
    note: document.getElementById('rf-note').value || null,
  };
  if (!body.title || !body.day_of_month) return alert('請填寫名稱和日期');
  await fetch(SB_URL + '/xlan_recurring', { method: 'POST', headers: H, body: JSON.stringify(body) });
  hideRecurringForm();
  loadRecurring();
}

async function toggleRecurring(id) {
  await api('/xlan_recurring?id=eq.' + id, { method: 'PATCH', body: JSON.stringify({ active: false }) });
  loadRecurring();
}

async function delRecurring(id) {
  if (!confirm('確定刪除？')) return;
  await api('/xlan_recurring?id=eq.' + id, { method: 'DELETE' });
  loadRecurring();
}

// --- Utils ---
function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
function fmtDate(s) { if (!s) return ''; return new Date(s).toLocaleString('zh-TW', { timeZone:'Asia/Taipei', month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit' }); }

// --- Init ---
const now = new Date();
const ym = now.getFullYear() + '-' + String(now.getMonth()+1).padStart(2,'0');
document.getElementById('expense-month').value = ym;
document.getElementById('event-month').value = ym;
loadTodos();
</script>
</body>
</html>
